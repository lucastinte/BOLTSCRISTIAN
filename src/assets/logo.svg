<svg width="200" height="100" viewBox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="cw-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#999999"/>
    </linearGradient>
    <linearGradient id="line-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc0022" stop-opacity="0" />
      <stop offset="20%" stop-color="#cc0022" />
      <stop offset="50%" stop-color="#ff1a40" />
      <stop offset="80%" stop-color="#cc0022" />
      <stop offset="100%" stop-color="#cc0022" stop-opacity="0" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="2" result="blur" />
        <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <g transform="translate(15, 0) skewX(-22)">
    <!-- CW text -->
    <text x="35" y="48" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="54" fill="url(#cw-gradient)" letter-spacing="-3" stroke="#e0e0e0" stroke-width="0.5">CW</text>
    
    <!-- Red glowing line divider -->
    <rect x="15" y="52" width="130" height="2" fill="url(#line-gradient)" filter="url(#glow)"/>
    
    <!-- LIFE text -->
    <text x="35" y="93" font-family="'Arial Black', Impact, sans-serif" font-weight="900" font-size="44" fill="#cc0022" letter-spacing="1">LIFE</text>
  </g>
</svg>
